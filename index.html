<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>COBOLDoc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      scroll-behavior: smooth;
      font-size: 16px
    }

    body {
      background: #0d1117;
      color: #d0daea;
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      line-height: 1.7
    }

    a {
      color: #58a6ff;
      text-decoration: none
    }

    a:hover {
      text-decoration: underline
    }

    ::-webkit-scrollbar {
      width: 6px
    }

    ::-webkit-scrollbar-track {
      background: #0d1117
    }

    ::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 3px
    }

    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #1c2128;
      --bg4: #21262d;
      --border: #30363d;
      --border2: #3d444d;
      --text: #d0daea;
      --muted: #8b96a8;
      --accent: #58a6ff;
      --accent2: #1f6feb;
      --green: #3fb950;
      --amber: #d29922;
      --coral: #f85149;
      --purple: #bc8cff;
      --teal: #39c5cf;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', system-ui, sans-serif
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden
    }

    /* TOPBAR */
    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 52px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 200;
      gap: 1rem
    }

    .topbar-logo {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px
    }

    .topbar-logo .slash {
      color: var(--accent)
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .btn {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--text);
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap
    }

    .btn:hover {
      background: var(--bg4)
    }

    .btn-primary {
      background: var(--accent2);
      border-color: var(--accent2);
      color: #fff
    }

    .btn-primary:hover {
      background: #388bfd
    }

    .btn-pdf {
      background: #1a2a1a;
      border-color: var(--green);
      color: var(--green)
    }

    .btn-pdf:hover {
      background: #1f381f
    }

    .btn-danger {
      background: transparent;
      border-color: #da3633;
      color: #f85149
    }

    .btn-danger:hover {
      background: rgba(248, 81, 73, .1)
    }

    .btn-sm {
      padding: 3px 10px;
      font-size: 11px
    }

    /* LAYOUT */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .sidebar-head {
      padding: 12px 16px 8px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0
    }

    .sidebar-scroll {
      overflow-y: auto;
      flex: 1;
      padding-bottom: 1rem
    }

    .file-group {
      border-bottom: 1px solid var(--border)
    }

    .file-group-header {
      padding: 8px 16px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .12s
    }

    .file-group-header:hover {
      background: var(--bg3)
    }

    .ftype {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 600;
      letter-spacing: .05em;
      flex-shrink: 0
    }

    .ftype-cbl {
      background: rgba(63, 185, 80, .15);
      color: var(--green)
    }

    .ftype-jcl {
      background: rgba(188, 140, 255, .15);
      color: var(--purple)
    }

    .ftype-cpy {
      background: rgba(57, 197, 207, .15);
      color: var(--teal)
    }

    .ftype-sql {
      background: rgba(210, 153, 34, .15);
      color: var(--amber)
    }

    .ftype-txt {
      background: rgba(125, 133, 144, .15);
      color: var(--muted)
    }

    .file-toc {
      list-style: none
    }

    .toc-h1>a {
      display: block;
      padding: 4px 16px 4px 24px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
      transition: color .12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .toc-h1>a:hover {
      color: #88c4ff;
      text-decoration: none
    }

    .toc-h2>a {
      display: block;
      padding: 3px 16px 3px 36px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--purple);
      transition: color .12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .toc-h2>a:hover {
      color: #d4aaff;
      text-decoration: none
    }

    /* MAIN */
    .main-scroll {
      flex: 1;
      overflow-y: auto
    }

    .content {
      padding: 2rem 2.5rem;
      max-width: 900px
    }

    /* UPLOAD ZONE */
    #upload-zone {
      display: none;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 2rem;
      text-align: center
    }

    .project-input-wrap {
      width: 100%;
      max-width: 600px;
      margin-bottom: 2rem
    }

    .project-input-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
      text-align: left
    }

    .project-input {
      width: 100%;
      font-family: var(--sans);
      font-size: 16px;
      font-weight: 600;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--border2);
      color: var(--text);
      padding: 6px 2px;
      outline: none;
      transition: border-color .2s;
      text-align: center
    }

    .project-input::placeholder {
      color: #3d444d
    }

    .project-input:focus {
      border-bottom-color: var(--accent)
    }

   .view-center {
  display: flex;
  flex-direction: row;
  justify-content: center;
  align-items: flex-start;
  gap: 2rem;
  flex-wrap: wrap;
  width: 100%;
}

    .drop-area {
      flex: 0 1 500px;
      border: 2px dashed var(--border2);
      border-radius: 16px;
      padding: 2.5rem 1.5rem;
      max-width: 600px;
      width: 100%;
      transition: border-color .2s, background .2s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;

    }

    .drop-area:hover,
    .drop-area.drag-over {
      border-color: var(--accent);
      background: rgba(88, 166, 255, .04)
    }

    .drop-area,
.added-files {
  flex: 0 1 500px;       /* no crecen, pueden encogerse, base 500px */
  max-width: none;        /* anula el max-width anterior */
  margin: 0;              /* anula cualquier margin: auto */
  width: auto;
}

.added-files {
  flex-basis: 400px;      /* un poco más angosto */
}

    .drop-icon {
      font-size: 64px;
      opacity: .4;
      line-height: 1
    }

    .drop-title {
      font-size: 22px;
      font-weight: 500;
      color: var(--text)
    }

    .drop-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 340px
    }

    .drop-formats {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: .25rem
    }

    .format-badge {
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted)
    }

    .added-files {
      margin-top: 1.5rem;
      width: 100%;
      max-width: 600px
    }

    .added-files-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: .5rem;
      text-transform: uppercase;
      letter-spacing: .06em
    }

    .added-file-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      background: var(--bg2);
      margin-bottom: 4px;
      border: 1px solid var(--border)
    }

    .added-file-name {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      flex: 1
    }

    .added-file-size {
      font-size: 11px;
      color: var(--muted)
    }

    /* PROJECT BANNER */
    .project-banner {
      text-align: center;
      padding: 1.5rem 0 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem
    }

    .project-banner h1 {
      font-size: 28px;
      font-weight: 600;
      color: var(--text)
    }

    .project-banner .project-sub {
      font-size: 13px;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: .25rem
    }

    /* FILE CARD */
    .file-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 2rem;
      overflow: hidden
    }

    .file-card-header {
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px
    }

    .file-card-name {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      flex: 1
    }

    .file-card-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono)
    }

    .file-card-body {
      padding: 1.5rem 1.75rem
    }

    .empty-file {
      font-size: 13px;
      color: var(--muted);
      font-family: var(--mono);
      font-style: italic
    }

    /* DOC ELEMENTS */
    .doc-h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      margin: 0 0 .75rem;
      line-height: 1.3
    }

    .doc-h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--purple);
      margin: 1.25rem 0 .5rem;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .doc-h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 16px;
      background: var(--purple);
      border-radius: 2px;
      flex-shrink: 0
    }

    .doc-p {
      font-size: 14px;
      color: #c4d0e4;
      margin-bottom: .35rem;
      line-height: 1.75
    }

    .doc-p b {
      color: var(--accent);
      font-weight: 500
    }

    .doc-hr {
      border: none;
      border-top: 1px solid var(--border2);
      margin: 1.25rem 0
    }

    .doc-br {
      display: block;
      height: .6rem
    }

    /* META GRID */
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 8px;
      margin: .75rem 0;
      padding: .75rem;
      background: var(--bg3);
      border-radius: 6px;
      border: 1px solid var(--border)
    }

    .meta-item {
      font-family: var(--mono);
      font-size: 12px;
      color: #c4d0e4
    }

    .meta-item strong {
      color: var(--accent);
      font-weight: 500;
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 2px
    }

    /* IO LIST */
    .io-list {
      list-style: none;
      margin: .5rem 0
    }

    .io-list li {
      font-family: var(--mono);
      font-size: 12px;
      color: #c4d0e4;
      padding: 4px 0;
      display: flex;
      gap: 8px;
      align-items: baseline
    }

    .io-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 600;
      white-space: nowrap
    }

    .io-in {
      background: rgba(57, 197, 207, .15);
      color: var(--teal)
    }

    .io-out {
      background: rgba(63, 185, 80, .15);
      color: var(--green)
    }

    .io-db2 {
      background: rgba(88, 166, 255, .15);
      color: var(--accent)
    }

    .io-ddname {
      color: var(--text);
      font-weight: 500
    }

    /* CHANGE TABLE */
    .change-table-wrap {
      margin: .75rem 0
    }

    .change-table-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 4px;
      font-family: var(--mono)
    }

    .change-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 12px;
      border-radius: 6px;
      overflow: hidden
    }

    .change-table th {
      background: var(--bg4);
      color: var(--muted);
      font-weight: 500;
      padding: 5px 10px;
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .06em;
      border-bottom: 1px solid var(--border)
    }

    .change-table td {
      padding: 5px 10px;
      border-bottom: 1px solid var(--border);
      color: #c4d0e4;
      vertical-align: top
    }

    .change-table tr:last-child td {
      border-bottom: none
    }

    /* REFS */
    .refs-section {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border)
    }

    .refs-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      font-family: var(--mono);
      margin-bottom: 6px
    }

    .refs-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px
    }

    .ref-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      text-decoration: none;
      transition: border-color .15s, background .15s
    }

    .ref-badge:hover {
      background: var(--bg4);
      border-color: var(--accent);
      text-decoration: none
    }

    .ref-see {
      border-left: 3px solid var(--accent)
    }

    .ref-uses {
      border-left: 3px solid var(--green)
    }

    .ref-rlabel {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted)
    }

    .ref-name {
      color: var(--text);
      font-weight: 500
    }

    .ref-icon {
      color: var(--accent);
      font-size: 11px
    }

    .ref-uses .ref-icon {
      color: var(--green)
    }

    /* DOC BLOCK WRAPPER */
    .doc-block {
      margin-bottom: 1.5rem
    }

    .doc-block+.doc-block {
      border-top: 1px solid var(--border);
      padding-top: 1.5rem
    }

    @media(max-width:760px) {
      .sidebar {
        display: none
      }

      .content {
        padding: 1rem
      }

      .topbar {
        padding: 0 1rem
      }


    }
  </style>
</head>

<body>
  <div id="app">
    <div class="topbar">
      <div class="topbar-logo"><span class="slash">📖</span>COBOL<span style="color:var(--muted)">Doc</span></div>
      <div class="topbar-actions">
        <span id="file-count-label" style="font-size:12px;color:var(--muted);display:none"></span>
        <button class="btn" id="btn-add-more" style="display:none" onclick="triggerAddMore()">+ Datasets</button>
        <button class="btn btn-primary" id="btn-export" style="display:none" onclick="exportHtml()">Exportar
          HTML</button>
        <button class="btn btn-pdf" id="btn-pdf" style="display:none" onclick="exportPdf()">Exportar PDF</button>
        <button class="btn btn-danger btn-sm" id="btn-clear" style="display:none" onclick="clearAll()">Limpiar</button>
        <button class="btn btn-info btn-sm" id="btn-readme" style="display:none" onclick="viewReadme()">README
          GITHUB</button>
      </div>
    </div>
    <div class="layout">
      <div class="sidebar" id="sidebar" style="display:none">
        <div class="sidebar-head">Datasets</div>
        <div class="sidebar-scroll" id="sidebar-toc"></div>
      </div>
      <div class="main-scroll" id="main-scroll">
        <div id="upload-zone">
          <div class="project-input-wrap">
            <label class="project-input-label" for="project-name">Nombre del proyecto</label>
            <input class="project-input" id="project-name" type="text" placeholder="Mi Proyecto COBOL"
              autocomplete="off">
          </div>
          <div class="project-input-wrap">
            <label class="project-input-label" for="project-url">URL del repositorio (GitHub)</label>
            <input class="project-input" id="project-url" type="url" placeholder="https://github.com/usuario/repo"
              autocomplete="off">
          </div>
          <div class="view-center">
            <div class="drop-area" id="drop-area" onclick="triggerFileInput()">
              <div class="drop-icon">📂</div>
              <div class="drop-title">Arrastre sus archivos aquí</div>
              <div class="drop-sub">Soporta múltiples archivos en el orden de carga</div>
              <button class="btn btn-primary" style="pointer-events:none">Seleccionar archivos</button>
              <div class="drop-formats">
                <span class="format-badge">.cbl</span>
                <span class="format-badge">.cob</span>
                <span class="format-badge">.jcl</span>
                <span class="format-badge">.cpy</span>
                <span class="format-badge">.sql</span>
                <span class="format-badge">.txt</span>
              </div>
            </div>
            <div class="added-files" id="pending-list" style="display:none">
              <div class="added-files-title">Archivos cargados</div>
              <div id="pending-rows"></div>
              <div style="margin-top:1rem;gap:8px">
                <button class="btn btn-primary" onclick="buildDocs()">Generar documentación</button>

              </div>
            </div>
          </div>
        </div>
        <div class="content" id="doc-output" style="display:none"></div>
      </div>
    </div>
  </div>
  <input type="file" id="file-input" multiple accept=".cbl,.cob,.jcl,.cpy,.sql,.txt" style="display:none">
  <input type="file" id="file-input-add" multiple accept=".cbl,.cob,.jcl,.cpy,.sql,.txt" style="display:none">

  <script>
    // ── STATE ──
    const state = { files: [], projectName: '' };

    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('upload-zone').style.display = 'flex';
    });

    // ── FILE HANDLING ──
    function triggerFileInput() { const fi = document.getElementById('file-input'); fi.value = ''; fi.onchange = e => handleFiles(e.target.files, false); fi.click(); }
    function triggerAddMore() { const fi = document.getElementById('file-input-add'); fi.value = ''; fi.onchange = e => handleFiles(e.target.files, true); fi.click(); }

    function handleFiles(fileList, addMore) {
      const p = [];
      for (const f of fileList) {
        const ext = f.name.split('.').pop().toLowerCase();
        if (!['cbl', 'cob', 'jcl', 'cpy', 'sql', 'txt'].includes(ext)) continue;
        p.push(new Promise(res => {
          const r = new FileReader();
          r.onload = e => { state.files.push({ name: f.name, ext, type: extType(ext), content: e.target.result, id: 'f' + Date.now() + Math.random().toString(36).slice(2, 6), size: f.size }); res(); };
          r.readAsText(f);
        }));
      }
      Promise.all(p).then(() => { if (!state.files.length) return; addMore ? buildDocs() : showPendingList(); });
    }

    function extType(e) { return { cbl: 'cbl', cob: 'cbl', jcl: 'jcl', cpy: 'cpy', sql: 'sql', txt: 'txt' }[e] || 'txt'; }

    function showPendingList() {
      document.getElementById('pending-list').style.display = 'block';
      document.getElementById('pending-rows').innerHTML = state.files.map(f => `
    <div class="added-file-row">
      <span class="ftype ftype-${f.type}">${f.type.toUpperCase()}</span>
      <span class="added-file-name">${f.name}</span>
      <span class="added-file-size">${(f.size / 1024).toFixed(1)} KB</span>
      <button class="btn btn-sm" style="color:var(--coral);border-color:var(--coral)" onclick="removeFile('${f.id}')">✕</button>
    </div>`).join('');
    }
    function removeFile(id) { state.files = state.files.filter(f => f.id !== id); state.files.length ? showPendingList() : document.getElementById('pending-list').style.display = 'none'; }
    function clearAll() {
      state.files = []; state.projectName = '';
      document.getElementById('doc-output').style.display = 'none';
      document.getElementById('doc-output').innerHTML = '';
      document.getElementById('upload-zone').style.display = 'flex';
      document.getElementById('sidebar').style.display = 'none';
      document.getElementById('pending-list').style.display = 'none';
      document.getElementById('btn-readme').style.display = 'none';
      document.getElementById('project-name').value = '';
      document.getElementById('project-url').value = '';
      ['btn-add-more', 'btn-export', 'btn-pdf', 'btn-clear', 'file-count-label'].forEach(id => document.getElementById(id).style.display = 'none');
    }

    // ── DRAG & DROP ──
    const dropArea = document.getElementById('drop-area');
    ['dragenter', 'dragover'].forEach(e => dropArea.addEventListener(e, ev => { ev.preventDefault(); dropArea.classList.add('drag-over') }));
    ['dragleave', 'drop'].forEach(e => dropArea.addEventListener(e, ev => { ev.preventDefault(); dropArea.classList.remove('drag-over') }));
    dropArea.addEventListener('drop', ev => { ev.preventDefault(); handleFiles(ev.dataTransfer.files, false) });

    function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    // ════════════════════════════════════════════════════════════════
    // PARSER — same logic for all formats
    // Only content between *>** ... *>** is documented
    // Inside the block:
    //   *=  text   → H1 (title)
    //   *-* text   → H2 (subtitle)
    //   *- @key:   → directive
    //   *-         → <hr> separator
    //   *          → blank line
    //   * text     → paragraph
    // ════════════════════════════════════════════════════════════════
    function parseBlocks(src, programId) {
      const lines = src.split('\n');
      const blocks = [];
      let inBlock = false;
      let blockLines = [];

      const flush = () => {
        if (blockLines.length) {
          blocks.push({ kind: 'doc', label: programId || '', rawLines: [...blockLines], anchor: 'b' + blocks.length });
        }
        blockLines = [];
      };

      for (const line of lines) {
        // Delimiter: line is ONLY *>** with optional whitespace
        if (/^\s*\*>\s*\*\*\s*$/.test(line)) {
          if (inBlock) { flush(); inBlock = false; }
          else { inBlock = true; }
          continue;
        }
        if (inBlock) {
          // Accept any line that starts with * (in cols 1-7) — covers all COBOL comment variants
          if (/^\s{0,6}\*/.test(line)) {
            blockLines.push(line.replace(/^\s{0,6}/, ''));
          }
          // Non-* lines (code) silently ignored
        }
      }
      if (inBlock && blockLines.length) flush();
      return blocks;
    }

    function detectProgramId(src, type) {
      if (type === 'jcl') {
        const m = src.match(/^\/\/([A-Z0-9@#$]{1,8})\s+JOB\b/im);
        return m ? m[1].trim().toUpperCase() : null;
      }
      if (type === 'sql') return 'SQL';
      const m = src.match(/PROGRAM-ID\s*\.\s*([A-Z0-9\-@#$]+)/i);
      return m ? m[1].trim().toUpperCase() : null;
    }

    function parseFile(f) {
      const programId = detectProgramId(f.content, f.type);
      const blocks = parseBlocks(f.content, programId);
      return { programId, blocks };
    }

    // ════════════════════════════════════════════════════════════════
    // RENDER BLOCK
    // ════════════════════════════════════════════════════════════════
    function renderBlock(rawLines) {
      const metaFields = {}, changes = [], inputs = [], outputs = [], db2s = [], refs = [];
      const items = [];

      for (const raw of rawLines) {
        const t = raw.trim();

        // *>** inside — shouldn't happen but skip
        if (/^\*>\s*\*\*/.test(t)) continue;

        // *= H1
        if (/^\*=\s*/.test(t)) {
          items.push({ type: 'h1', text: t.replace(/^\*=\s*/, '').trim() }); continue;
        }
        // *-* H2
        if (/^\*-\*\s+/.test(t)) {
          items.push({ type: 'h2', text: t.replace(/^\*-\*\s+/, '').trim() }); continue;
        }
        // *- alone → hr
        if (/^\*-\s*$/.test(t)) {
          items.push({ type: 'hr' }); continue;
        }
        // * alone → br
        if (/^\*\s*$/.test(t)) {
          items.push({ type: 'br' }); continue;
        }
        // *- @directive
        if (/^\*-\s*@/.test(t)) {
          const inner = t.replace(/^\*-\s*/, '');
          const atM = inner.match(/^@([a-zA-Z\-]+)[:\s]\s*(.*)/);
          if (atM) {
            const key = atM[1].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            const val = atM[2].trim();
            switch (key) {
              case 'autor': case 'author': metaFields.autor = val; break;
              case 'fecha': case 'date': metaFields.fecha = val; break;
              case 'version': metaFields.version = val; break;
              case 'licencia': case 'license': metaFields.licencia = val; break;
              case 'modificacion': case 'lastmodified': case 'modified': metaFields.modificacion = val; break;
              case 'input': inputs.push(val); break;
              case 'output': outputs.push(val); break;
              case 'db2': db2s.push(val); break;
              case 'see': {
                const sM = val.match(/^([A-Z0-9\-@#$]+)\s+(https?:\/\/\S+)/i);
                if (sM) refs.push({ kind: 'see', name: sM[1].toUpperCase(), url: sM[2] });
                else { const uM = val.match(/^(https?:\/\/\S+)/i); if (uM) refs.push({ kind: 'see', name: 'Ref', url: uM[1] }); }
                break;
              }
              case 'uses': {
                const uM = val.match(/^([A-Z0-9\-@#$]+)(?:\s+(https?:\/\/\S+))?/i);
                if (uM) refs.push({ kind: 'uses', name: uM[1].toUpperCase(), url: uM[2] || null });
                break;
              }
              case 'change': changes.push(val); break;
              default: items.push({ type: 'p', label: atM[1], text: val });
            }
          }
          continue;
        }
        // * @directive (without dash)
        if (/^\*\s*@/.test(t)) {
          const inner = t.replace(/^\*\s*/, '');
          const atM = inner.match(/^@([a-zA-Z\-]+)[:\s]\s*(.*)/);
          if (atM) {
            const key = atM[1].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            const val = atM[2].trim();
            switch (key) {
              case 'autor': case 'author': metaFields.autor = val; break;
              case 'fecha': case 'date': metaFields.fecha = val; break;
              case 'version': metaFields.version = val; break;
              case 'licencia': case 'license': metaFields.licencia = val; break;
              case 'modificacion': case 'lastmodified': metaFields.modificacion = val; break;
              case 'input': inputs.push(val); break;
              case 'output': outputs.push(val); break;
              case 'db2': db2s.push(val); break;
              case 'see': {
                const sM = val.match(/^([A-Z0-9\-@#$]+)\s+(https?:\/\/\S+)/i);
                if (sM) refs.push({ kind: 'see', name: sM[1].toUpperCase(), url: sM[2] });
                break;
              }
              case 'uses': {
                const uM = val.match(/^([A-Z0-9\-@#$]+)/i);
                if (uM) refs.push({ kind: 'uses', name: uM[1].toUpperCase(), url: null });
                break;
              }
              case 'change': changes.push(val); break;
              default: items.push({ type: 'p', label: atM[1], text: val });
            }
          }
          continue;
        }
        // *- text → paragraph
        if (/^\*-\s+/.test(t)) {
          items.push({ type: 'p', text: t.replace(/^\*-\s+/, '').trim() }); continue;
        }
        // * text → paragraph
        if (/^\*\s+/.test(t)) {
          items.push({ type: 'p', text: t.replace(/^\*\s+/, '').trim() }); continue;
        }
      }

      // Build HTML
      let html = '';
      for (const item of items) {
        if (item.type === 'h1') html += `<div class="doc-h1">${esc(item.text)}</div>`;
        else if (item.type === 'h2') html += `<div class="doc-h2">${esc(item.text)}</div>`;
        else if (item.type === 'hr') html += `<div class="doc-hr"></div>`;
        else if (item.type === 'br') html += `<div class="doc-br"></div>`;
        else if (item.type === 'p' && item.label) html += `<div class="doc-p"><b>${esc(item.label)}:</b> ${esc(item.text)}</div>`;
        else if (item.type === 'p') html += `<div class="doc-p">${esc(item.text)}</div>`;
      }

      // Meta grid
      const me = [['Autor', metaFields.autor], ['Fecha', metaFields.fecha], ['Versión', metaFields.version], ['Licencia', metaFields.licencia], ['Última modificación', metaFields.modificacion]].filter(([, v]) => v);
      if (me.length) html += `<div class="meta-grid">` + me.map(([k, v]) => `<div class="meta-item"><strong>${k}</strong>${esc(v)}</div>`).join('') + `</div>`;

      // IO
      const io = [...inputs.map(v => ({ b: 'io-in', l: 'INPUT', v })), ...outputs.map(v => ({ b: 'io-out', l: 'OUTPUT', v })), ...db2s.map(v => ({ b: 'io-db2', l: 'DB2', v }))];
      if (io.length) html += `<ul class="io-list">` + io.map(x => { const p = x.v.split(/\s+(.*)/); return `<li><span class="io-badge ${x.b}">${x.l}</span><span class="io-ddname">${esc(p[0])}</span>${p[1] ? ' — ' + esc(p[1]) : ''}</li>` }).join('') + `</ul>`;

      // Changes
      if (changes.length) html += `<div class="change-table-wrap"><div class="change-table-title">Historial de cambios</div><table class="change-table"><thead><tr><th>Fecha</th><th>Autor</th><th>Descripción</th></tr></thead><tbody>` + changes.map(c => { const p = c.split(/\s+/, 3); return `<tr><td>${esc(p[0] || '')}</td><td>${esc(p[1] || '')}</td><td>${esc(c.replace(p[0] || '', '').replace(p[1] || '', '').trim())}</td></tr>` }).join('') + `</tbody></table></div>`;

      // Refs
      if (refs.length) html += `<div class="refs-section"><div class="refs-section-label">Rutinas</div><div class="refs-bar">` + refs.map(r => { const icon = r.kind === 'see' ? '↗' : '⟶'; const inner = `<span class="ref-rlabel">${r.kind === 'see' ? 'ver' : 'usa'}</span><span class="ref-name">${esc(r.name)}</span><span class="ref-icon">${icon}</span>`; return r.url ? `<a href="${r.url}" target="_blank" class="ref-badge ref-${r.kind}">${inner}</a>` : `<span class="ref-badge ref-${r.kind}">${inner}</span>` }).join('') + `</div></div>`;

      return html;
    }

    // Extract H1/H2 titles from rawLines for sidebar
    function extractTitles(rawLines) {
      const titles = [];
      for (const raw of rawLines) {
        const t = raw.trim();
        if (/^\*=\s*/.test(t)) titles.push({ level: 'h1', text: t.replace(/^\*=\s*/, '').trim() });
        else if (/^\*-\*\s+/.test(t)) titles.push({ level: 'h2', text: t.replace(/^\*-\*\s+/, '').trim() });
      }
      return titles;
    }

    // ════════════════════════════════════════════════════════════════
    // BUILD FILE CARD
    // ════════════════════════════════════════════════════════════════
    function buildFileCard(f, parsed) {
      const { programId, blocks } = parsed;
      const title = programId || f.name.replace(/\.[^.]+$/, '').toUpperCase();
      let body = '';
      if (!blocks.length) {
        body = `<div class="empty-file">No se encontraron bloques *>** en este dataset.</div>`;
      } else {
        blocks.forEach((b, i) => {
          const rendered = renderBlock(b.rawLines);
          body += `<div class="doc-block" id="${b.anchor}">${rendered}</div>`;
        });
      }
      return `<div class="file-card" id="card-${f.id}">
    <div class="file-card-header">
      <span class="ftype ftype-${f.type}">${f.type.toUpperCase()}</span>
      <span class="file-card-name">${esc(title)}</span>
      <span class="file-card-meta">${esc(f.name)} · ${blocks.length} bloque${blocks.length !== 1 ? 's' : ''}</span>
    </div>
    <div class="file-card-body">${body}</div>
  </div>`;
    }

    // ════════════════════════════════════════════════════════════════
    // BUILD SIDEBAR
    // ════════════════════════════════════════════════════════════════
    function buildSidebar(files, parsedList) {
      let html = '';
      for (let i = 0; i < files.length; i++) {
        const f = files[i];
        const { programId, blocks } = parsedList[i];
        const title = programId || f.name.replace(/\.[^.]+$/, '').toUpperCase();
        let items = '';
        blocks.forEach(b => {
          const titles = extractTitles(b.rawLines);
          if (titles.length) {
            titles.forEach(t => {
              items += `<li class="toc-${t.level}"><a href="#${b.anchor}" title="${esc(t.text)}">${esc(t.text)}</a></li>`;
            });
          } else {
            // block has no H1/H2 — use anchor only, no sidebar entry
          }
        });
        html += `<div class="file-group">
      <div class="file-group-header" onclick="document.getElementById('card-${f.id}').scrollIntoView({behavior:'smooth'})">
        <span class="ftype ftype-${f.type}">${f.type.toUpperCase()}</span>${esc(title)}
      </div>${items ? `<ul class="file-toc">${items}</ul>` : ''}
    </div>`;
      }
      return html;
    }

    // ════════════════════════════════════════════════════════════════
    // BUILD DOCS
    // ════════════════════════════════════════════════════════════════
    function buildDocs() {
      if (!state.files.length) return;
      state.projectName = document.getElementById('project-name').value.trim().toUpperCase();;
      state.projectUrl = document.getElementById('project-url').value.trim();
      const parsedList = state.files.map(f => parseFile(f));
      const now = new Date().toLocaleDateString('es-AR', { year: 'numeric', month: 'long', day: 'numeric' });
      let cards = '';
      if (state.projectName) cards += `<div class="project-banner"><h1>${esc(state.projectName)}</h1><div class="project-sub">Generado: ${now}</div></div>`;
      parsedList.forEach((p, i) => cards += buildFileCard(state.files[i], p));
      document.getElementById('upload-zone').style.display = 'none';
      const out = document.getElementById('doc-output');
      out.innerHTML = cards; out.style.display = 'block';
      document.getElementById('sidebar').style.display = 'flex';
      document.getElementById('sidebar-toc').innerHTML = buildSidebar(state.files, parsedList);
      document.getElementById('btn-add-more').style.display = 'inline-block';
      document.getElementById('btn-export').style.display = 'inline-block';
      document.getElementById('btn-pdf').style.display = 'inline-block';
      document.getElementById('btn-clear').style.display = 'inline-block';
      document.getElementById('btn-readme').style.display = 'inline-block';
      const lbl = document.getElementById('file-count-label');
      lbl.textContent = state.files.length + ' dataset' + (state.files.length !== 1 ? 's' : '');
      lbl.style.display = 'inline';
    }

    // ════════════════════════════════════════════════════════════════
    // Navegar al README del repositorio
    // ════════════════════════════════════════════════════════════════
    function viewReadme() {
      // 1. Se obtiene la URL de la variable global 'state'
      let url = state.projectUrl;

      // 2. Validación: si la URL existe y no está vacía, la abre
      if (url && url.trim() !== "") {
        window.open(url, '_blank', 'noopener,noreferrer');
        return; // Importante: aquí termina la ejecución si todo está bien
      }

      // 3. Si no hay URL, se muestra la alerta moderna con SweetAlert2
      Swal.fire({
        title: '⛔ No se encontró la URL',
        text: 'Este Proyecto no tiene un Repositorio asociado.',
        icon: 'warning',
        confirmButtonText: 'Entendido',
        confirmButtonColor: '#3085d6',
        background: '#1e1e2f',    // fondo oscuro
        color: '#ffffff'          // texto blanco
      });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
